    <title>Rotagem</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #eee;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }
        h1 { margin-bottom: 10px; font-size: 2rem; letter-spacing: 4px; }
        #score { max-width: 100%; text-align: right; font-size: 1.5rem; margin-bottom: 5px; }
        #game-container { display: flex; align-items: center; justify-content: center; gap: 10px; max-width: 100%; }
        #gameCanvas { 
            border: 4px solid #333; 
            border-radius: 4px; 
            max-width: 100%;
            max-height: 60vh;
            width: auto;
            height: auto;
        }
        .arrow-btn {
            background: transparent;
            color: #fff;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            padding: 10px;
            flex-shrink: 0;
        }
        .arrow-btn:hover {
            color: #ccc;
        }
        @media (max-width: 500px) {
            .arrow-btn { font-size: 1.5rem; padding: 5px; }
            #game-container { gap: 5px; }
        }
    </style>
</head>
<body>
    <h1>ROTAGEM</h1>
    <div id="score" style="text-align: right; font-size: 1.5rem; margin-bottom: 5px;"></div>
    <div id="game-container">
        <button class="arrow-btn" onclick="rotate(-1)">◀</button>
        <canvas id="gameCanvas"></canvas>
        <button class="arrow-btn" onclick="rotate(1)">▶</button>
    </div>
    <div id="status"></div>
    <div id="controls">
        <button class="arrow-btn" onclick="surrender()" style="font-size: 1.5rem;">🏳️</button>
    </div>

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const scoreEl = document.getElementById('score');

        function resizeCanvas() {
            const maxSize = Math.min(window.innerWidth - 80, window.innerHeight * 0.55, 400);
            canvas.width = maxSize;
            canvas.height = maxSize;
            if (board.length > 0) drawBoard(board);
        }

        window.addEventListener('resize', resizeCanvas);

        const CELL_SIZE = 80;
        const COLORS = ['red'];
        
        let GRID_SIZE = 3;
        let currentPuzzleIndex = 0;
        let userMoves = 0;
        let board = [];
        let initialBoard = null;
        let gameState = 'idle';
        let animating = false;
        let targetBoard = null;
        let currentSolution = null;
        let puzzlesLoaded = false;
        let currentLevel = 1;
        let puzzlesByLevel = {};

        function initDB() {
            let puzzles = EMBEDDED_PUZZLES;
            
            puzzles = puzzles.filter(p => p.solution && p.solution.length > 0);
            
            puzzlesByLevel = {};
            for (const p of puzzles) {
                const size = Math.sqrt(p.puzzle.length);
                const len = p.solution.split(',').length;
                if (!puzzlesByLevel[len]) puzzlesByLevel[len] = [];
                puzzlesByLevel[len].push({ ...p, grid_size: size, elements: p.elements || 0 });
            }
            
            for (const len in puzzlesByLevel) {
                puzzlesByLevel[len].sort((a, b) => a.elements - b.elements);
            }
            
            puzzlesLoaded = true;
            newPuzzle();
        }

        function updateStatus() {
            const solutionLen = currentSolution ? currentSolution.length : '?';
            scoreEl.textContent = `${userMoves}/${solutionLen}`;
        }

        function getColorHex(color) {
            const colorMap = {
                'white': '#ffffff', 'black': '#000000', 'grey': '#888888',
                'red': '#ff4444', 'green': '#44ff44', 'blue': '#4444ff',
                'cyan': '#44ffff', 'magenta': '#ff44ff', 'yellow': '#ffff44'
            };
            return colorMap[color] || '#ffffff';
        }

        function createEmptyBoard(size) {
            const s = size || GRID_SIZE;
            return Array(s).fill(null).map(() => Array(s).fill(null).map(() => ({ type: 'empty', color: null })));
        }

        function rotateBoard(board, clockwise) {
            const size = board.length;
            const newBoard = createEmptyBoard(size);
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const newX = clockwise ? size - 1 - y : y;
                    const newY = clockwise ? x : size - 1 - x;
                    newBoard[newY][newX] = { ...board[y][x] };
                }
            }
            return newBoard;
        }

        function applyGravity(board) {
            const size = board.length;
            const newBoard = createEmptyBoard(size);
            let changed = false;
            const fallMap = [];

            for (let x = 0; x < size; x++) {
                let writeY = size - 1;
                for (let y = size - 1; y >= 0; y--) {
                    const cell = board[y][x];
                    if (cell.type === 'empty') continue;
                    
                    if (cell.type === 'block' && cell.color === 'black') {
                        newBoard[y][x] = { ...cell };
                        writeY = y - 1;
                        continue;
                    }
                    
                    if (writeY !== y) {
                        changed = true;
                        fallMap.push({ x, fromY: y, toY: writeY, cell: { ...cell } });
                    }
                    newBoard[writeY][x] = { ...cell };
                    writeY--;
                }
            }
            return { board: newBoard, changed, fallMap };
        }

        function findConnected(board, startX, startY, color, visited) {
            const key = `${startX},${startY}`;
            if (visited.has(key)) return [];
            if (startX < 0 || startX >= board.length || startY < 0 || startY >= board.length) return [];
            if (board[startY][startX].type !== 'piece' || board[startY][startX].color !== color) return [];
            visited.add(key);
            let connected = [{ x: startX, y: startY }];
            for (const [dx, dy] of [[0, 1], [0, -1], [1, 0], [-1, 0]]) {
                connected = connected.concat(findConnected(board, startX + dx, startY + dy, color, visited));
            }
            return connected;
        }

        function findAllMatches(board) {
            const size = board.length;
            const visited = new Set();
            const matches = [];
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const key = `${x},${y}`;
                    if (!visited.has(key) && board[y][x].type === 'piece') {
                        const connected = findConnected(board, x, y, board[y][x].color, new Set());
                        if (connected.length >= 2) {
                            matches.push(...connected);
                            connected.forEach(c => visited.add(`${c.x},${c.y}`));
                        }
                    }
                }
            }
            return matches;
        }

        function removeMatches(board, matches) {
            const newBoard = board.map(row => row.map(cell => ({ ...cell })));
            const matchSet = new Set(matches.map(m => `${m.x},${m.y}`));
            for (let y = 0; y < board.length; y++) {
                for (let x = 0; x < board.length; x++) {
                    if (matchSet.has(`${x},${y}`)) newBoard[y][x] = { type: 'empty', color: null };
                }
            }
            return newBoard;
        }

        function cloneBoard(b) { return b.map(row => row.map(cell => ({ ...cell }))); }

        function checkWin(b) { return b.every(row => row.every(cell => cell.type !== 'piece')); }

        function checkLose(b) {
            const colorCounts = {};
            for (let y = 0; y < b.length; y++) {
                for (let x = 0; x < b.length; x++) {
                    if (b[y][x].type === 'piece') {
                        const color = b[y][x].color;
                        colorCounts[color] = (colorCounts[color] || 0) + 1;
                    }
                }
            }
            return Object.values(colorCounts).some(count => count === 1);
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        async function rotate(direction) {
            if (gameState !== 'idle' || animating) return;
            animating = true;
            gameState = 'rotating';
            userMoves++;
            updateStatus();

            targetBoard = rotateBoard(board, direction === 1);
            for (let i = 0; i <= 10; i++) {
                drawRotatingBoard(board, i / 10, direction);
                await sleep(15);
            }

            board = targetBoard;
            targetBoard = null;
            drawBoard(board);
            await settleBoard();
            updateStatus();
        }

        async function settleBoard(animate = true) {
            gameState = 'settling';
            let loopCount = 0;
            while (loopCount < 100) {
                if (animate) {
                    const { board: gBoard, changed, fallMap } = applyGravity(board);
                    if (!changed) break;
                    for (let i = 0; i <= 4; i++) {
                        drawFallingBoard(board, fallMap, i / 4);
                        await sleep(50);
                    }
                    board = gBoard;
                } else {
                    const { board: gBoard, changed } = applyGravity(board);
                    if (!changed) break;
                    board = gBoard;
                }

                const matches = findAllMatches(board);
                if (matches.length === 0) break;
                
                if (animate) await blinkMatches(board, matches, 3);
                board = removeMatches(board, matches);
                if (animate) {
                    drawBoard(board);
                    await sleep(150);
                }
                loopCount++;
            }

            if (!animate) drawBoard(board);

            if (checkWin(board)) {
                gameState = 'win';
                const optimalMoves = currentSolution.length;
                if (userMoves <= optimalMoves) {
                    currentLevel++;
                } else {
                    currentLevel = Math.max(1, currentLevel - 1);
                }
                setTimeout(() => newPuzzle(), 800);
            } else if (checkLose(board)) {
                gameState = 'lose';
                currentLevel = 1;
                setTimeout(() => newPuzzle(), 800);
            } else {
                gameState = 'idle';
            }
            animating = false;
        }

        function drawBoard(b) {
            const cellSize = canvas.width / b.length;
            ctx.fillStyle = '#888888';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < b.length; y++) {
                for (let x = 0; x < b.length; x++) {
                    const cell = b[y][x];
                    if (cell.type === 'empty') continue;
                    ctx.fillStyle = getColorHex(cell.color);
                    if (cell.type === 'block') {
                        ctx.fillRect(x * cellSize + 2, y * cellSize + 2, cellSize - 4, cellSize - 4);
                    } else {
                        const radius = (cellSize - 12) / 2;
                        ctx.beginPath();
                        ctx.arc(x * cellSize + cellSize / 2, y * cellSize + cellSize / 2, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }

        function drawRotatingBoard(fromBoard, progress, direction) {
            const cellSize = canvas.width / fromBoard.length;
            ctx.fillStyle = '#888888';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const angle = (Math.PI / 2) * progress * direction;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            for (let y = 0; y < fromBoard.length; y++) {
                for (let x = 0; x < fromBoard.length; x++) {
                    const cell = fromBoard[y][x];
                    if (cell.type === 'empty') continue;
                    const origPx = x * cellSize + cellSize / 2 - centerX;
                    const origPy = y * cellSize + cellSize / 2 - centerY;
                    const cos = Math.cos(angle), sin = Math.sin(angle);
                    const newPx = origPx * cos - origPy * sin + centerX;
                    const newPy = origPx * sin + origPy * cos + centerY;
                    const drawX = newPx - cellSize / 2;
                    const drawY = newPy - cellSize / 2;
                    ctx.fillStyle = getColorHex(cell.color);
                    if (cell.type === 'block') {
                        ctx.save();
                        ctx.translate(drawX + cellSize / 2, drawY + cellSize / 2);
                        ctx.rotate(angle);
                        ctx.fillRect(-cellSize / 2 + 2, -cellSize / 2 + 2, cellSize - 4, cellSize - 4);
                        ctx.restore();
                    } else {
                        const radius = (cellSize - 12) / 2;
                        ctx.beginPath();
                        ctx.arc(drawX + cellSize / 2, drawY + cellSize / 2, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }

        function drawFallingBoard(fromBoard, fallMap, progress) {
            const cellSize = canvas.width / fromBoard.length;
            ctx.fillStyle = '#888888';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const pos = {};
            for (const f of fallMap) {
                pos[`${f.x},${f.fromY}`] = f.fromY + (f.toY - f.fromY) * progress;
            }
            for (let y = 0; y < fromBoard.length; y++) {
                for (let x = 0; x < fromBoard.length; x++) {
                    const key = `${x},${y}`;
                    let cell, drawY;
                    if (pos[key] !== undefined) {
                        const fall = fallMap.find(f => f.x === x && f.fromY === y);
                        cell = fall.cell;
                        drawY = pos[key];
                    } else {
                        const origY = y;
                        let found = false;
                        for (const f of fallMap) {
                            if (f.x === x && f.toY === y) {
                                found = true;
                                break;
                            }
                        }
                        if (found) continue;
                        cell = fromBoard[y][x];
                        drawY = y;
                    }
                    if (cell.type === 'empty') continue;
                    ctx.fillStyle = getColorHex(cell.color);
                    if (cell.type === 'block') {
                        ctx.fillRect(x * cellSize + 2, drawY * cellSize + 2, cellSize - 4, cellSize - 4);
                    } else {
                        const radius = (cellSize - 12) / 2;
                        ctx.beginPath();
                        ctx.arc(x * cellSize + cellSize / 2, drawY * cellSize + cellSize / 2, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }

        async function blinkMatches(board, matches, times) {
            const cellSize = canvas.width / board.length;
            const matchSet = new Set(matches.map(m => `${m.x},${m.y}`));
            for (let i = 0; i < times * 2; i++) {
                const showOriginal = Math.floor(i / 2) % 2 === 0;
                ctx.fillStyle = '#888888';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                for (let y = 0; y < board.length; y++) {
                    for (let x = 0; x < board.length; x++) {
                        const cell = board[y][x];
                        if (cell.type === 'empty') continue;
                        if (matchSet.has(`${x},${y}`)) {
                            ctx.fillStyle = showOriginal ? getColorHex(cell.color) : '#888888';
                        } else {
                            ctx.fillStyle = getColorHex(cell.color);
                        }
                        if (cell.type === 'block') {
                            ctx.fillRect(x * cellSize + 2, y * cellSize + 2, cellSize - 4, cellSize - 4);
                            if (matchSet.has(`${x},${y}`) && !showOriginal) {
                                ctx.strokeStyle = '#ffffff';
                                ctx.lineWidth = 2;
                                ctx.setLineDash([4, 4]);
                                ctx.strokeRect(x * cellSize + 4, y * cellSize + 4, cellSize - 8, cellSize - 8);
                                ctx.setLineDash([]);
                            }
                        } else {
                            const radius = (cellSize - 12) / 2;
                            ctx.beginPath();
                            ctx.arc(x * cellSize + cellSize / 2, y * cellSize + cellSize / 2, radius, 0, Math.PI * 2);
                            ctx.fill();
                            if (matchSet.has(`${x},${y}`) && !showOriginal) {
                                ctx.strokeStyle = '#ffffff';
                                ctx.lineWidth = 2;
                                ctx.setLineDash([4, 4]);
                                ctx.stroke();
                                ctx.setLineDash([]);
                            }
                        }
                    }
                }
                await sleep(150);
            }
            drawBoard(board);
        }

        async function newPuzzle() {
            if (!puzzlesLoaded) { setStatus('Loading...'); return; }
            let puzzle = null;
            for (let l = currentLevel; l <= 20; l++) {
                puzzle = getPuzzle(l);
                if (puzzle) { currentLevel = l; break; }
            }
            if (!puzzle) { currentLevel = 1; puzzle = getPuzzle(currentLevel); }
            if (!puzzle) { setStatus('No puzzles!'); return; }
            loadPuzzle(puzzle);
        }

        function getPuzzle(level) {
            if (!puzzlesByLevel[level] || puzzlesByLevel[level].length === 0) return null;
            return puzzlesByLevel[level].shift();
        }

        function loadPuzzle(puzzle) {
            let puzzleStr = puzzle.puzzle;
            let solution = puzzle.solution ? puzzle.solution.split(',').map(Number) : [];
            GRID_SIZE = puzzle.grid_size || Math.sqrt(puzzleStr.length);
            board = stringToBoard(puzzleStr);
            initialBoard = cloneBoard(board);
            resizeCanvas();
            gameState = 'idle';
            animating = false;
            userMoves = 0;
            currentSolution = solution;
            updateStatus();
        }

        function restart() {
            if (animating) return;
            board = cloneBoard(initialBoard);
            userMoves = 0;
            gameState = 'idle';
            drawBoard(board);
            updateStatus();
        }

        function surrender() {
            currentLevel = 1;
            newPuzzle();
        }

        function setStatus(text) { statusEl.textContent = text; }

        const TYPE_TO_NUM = { 'empty': 0, 'block_black': 1, 'block_white': 2, 'piece_red': 3 };

        function stringToBoard(s) {
            const size = Math.sqrt(s.length);
            const board = createEmptyBoard(size);
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const n = parseInt(s[y * size + x]);
                    if (n === 1) board[y][x] = { type: 'block', color: 'black' };
                    else if (n === 2) board[y][x] = { type: 'block', color: 'white' };
                    else if (n === 3) board[y][x] = { type: 'piece', color: 'red' };
                    else board[y][x] = { type: 'empty', color: null };
                }
            }
            return board;
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') rotate(-1);
            else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') rotate(1);
            else if (e.key === 'Escape') surrender();
            else if (e.key === 's' || e.key === 'S') {
                if (gameState === 'idle' && !animating) setStatus(currentSolution ? `Solution: ${currentSolution.map(d => d === -1 ? '←' : '→').join(' ')}` : 'No solution');
            }
        });

        initDB();
    </script>
